<!doctype html>
<html lang="id" class="h-full">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPI Dinasti Fatimiyah</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&amp;family=Source+Sans+3:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .font-heading { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Source Sans 3', sans-serif; }
    .slide-enter { animation: slideIn 0.4s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .pattern-bg {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .nav-btn { transition: all 0.2s; }
    .nav-btn:hover { transform: scale(1.05); }
    .quiz-option { transition: all 0.2s; }
    .quiz-option:hover { transform: translateX(4px); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full font-body">
  <div id="app" class="h-full w-full overflow-auto" style="background: #1a1a2e;"><!-- Navigation Bar -->
   <nav class="sticky top-0 z-50 px-4 py-3 flex items-center justify-between" style="background: #16213e; border-bottom: 2px solid #e94560;">
    <div class="flex items-center gap-2">
     <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: #e94560;"><i data-lucide="book-open" style="width:16px;height:16px;color:#fff;"></i>
     </div><span class="font-heading font-bold text-white text-sm" id="nav-title">Dinasti Fatimiyah</span>
    </div>
    <div class="flex items-center gap-1" id="nav-dots"></div>
   </nav><!-- Content Area -->
   <div id="content" class="p-4 md:p-8 max-w-4xl mx-auto"></div><!-- Bottom Navigation -->
   <div class="sticky bottom-0 px-4 py-3 flex items-center justify-between" style="background: #16213e; border-top: 2px solid #e94560;"><button onclick="prevSlide()" class="nav-btn px-4 py-2 rounded-lg text-white font-semibold text-sm flex items-center gap-1" style="background: #0f3460;"> <i data-lucide="chevron-left" style="width:16px;height:16px;"></i> Sebelumnya </button> <span class="text-white text-xs opacity-70" id="page-info">1 / 7</span> <button onclick="nextSlide()" class="nav-btn px-4 py-2 rounded-lg text-white font-semibold text-sm flex items-center gap-1" style="background: #e94560;"> Selanjutnya <i data-lucide="chevron-right" style="width:16px;height:16px;"></i> </button>
   </div>
  </div>
  <script>
    // Config & SDK
    const defaultConfig = {
      main_title: 'Dinasti Fatimiyah',
      subtitle: 'Sejarah Kebudayaan Islam Kelas 8 SMP',
      background_color: '#1a1a2e',
      surface_color: '#16213e',
      text_color: '#ffffff',
      primary_action: '#e94560',
      secondary_action: '#0f3460',
      font_family: 'Playfair Display',
      font_size: 16
    };

    let config = { ...defaultConfig };
    let currentSlide = 0;

    // Slides data
    const slides = [
      { type: 'cover' },
      { type: 'content', title: 'Sejarah Berdirinya', icon: 'landmark', content: `
        <p class="mb-3">Dinasti Fatimiyah (909-1171 M) didirikan oleh <strong>Ubaidillah al-Mahdi</strong> di wilayah Afrika Utara (Tunisia). Nama "Fatimiyah" diambil dari <strong>Fatimah az-Zahra</strong>, putri Nabi Muhammad SAW.</p>
        <p class="mb-3">Dinasti ini mengklaim keturunan dari Ali bin Abi Thalib dan Fatimah az-Zahra melalui garis Imam Ismail bin Ja'far ash-Shadiq.</p>
        <div class="mt-4 p-4 rounded-lg" style="background:rgba(233,69,96,0.1);border-left:4px solid #e94560;">
          <p class="font-semibold">📌 Fakta Penting</p>
          <p>Dinasti Fatimiyah bermazhab Syiah Ismailiyah dan menjadi salah satu dinasti terbesar dalam sejarah Islam.</p>
        </div>
      `},
      { type: 'content', title: 'Khalifah-Khalifah Penting', icon: 'crown', content: `
        <div class="space-y-3">
          <div class="p-3 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold" style="color:#e94560;">1. Ubaidillah al-Mahdi (909-934 M)</p>
            <p class="text-sm opacity-80">Pendiri dinasti, mendirikan kota Mahdiyah sebagai ibukota pertama.</p>
          </div>
          <div class="p-3 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold" style="color:#e94560;">2. Al-Mu'izz li Dinillah (953-975 M)</p>
            <p class="text-sm opacity-80">Menaklukkan Mesir dan mendirikan kota Kairo (al-Qahirah) tahun 969 M.</p>
          </div>
          <div class="p-3 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold" style="color:#e94560;">3. Al-Aziz Billah (975-996 M)</p>
            <p class="text-sm opacity-80">Membangun kemakmuran dan toleransi beragama di Mesir.</p>
          </div>
          <div class="p-3 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold" style="color:#e94560;">4. Al-Hakim bi Amrillah (996-1021 M)</p>
            <p class="text-sm opacity-80">Mendirikan Darul Hikmah sebagai pusat ilmu pengetahuan.</p>
          </div>
        </div>
      `},
      { type: 'content', title: 'Kemajuan Peradaban', icon: 'sparkles', content: `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="p-4 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold mb-2">🕌 Arsitektur</p>
            <p class="text-sm">Masjid Al-Azhar (970 M), Masjid Al-Hakim, dan Gerbang Bab al-Futuh.</p>
          </div>
          <div class="p-4 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold mb-2">📚 Pendidikan</p>
            <p class="text-sm">Universitas Al-Azhar menjadi pusat pendidikan Islam tertua yang masih berdiri.</p>
          </div>
          <div class="p-4 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold mb-2">🔬 Ilmu Pengetahuan</p>
            <p class="text-sm">Darul Hikmah memiliki 600.000 koleksi buku dan menjadi pusat riset.</p>
          </div>
          <div class="p-4 rounded-lg card-hover" style="background:rgba(15,52,96,0.5);">
            <p class="font-bold mb-2">💰 Ekonomi</p>
            <p class="text-sm">Perdagangan maritim berkembang pesat di Laut Merah dan Mediterania.</p>
          </div>
        </div>
      `},
      { type: 'content', title: 'Peta Kekuasaan', icon: 'map', content: `
        <p class="mb-4">Wilayah kekuasaan Dinasti Fatimiyah membentang luas:</p>
        <div class="p-4 rounded-lg mb-4" style="background:rgba(15,52,96,0.5);">
          <svg viewBox="0 0 500 200" class="w-full h-auto">
            <rect x="0" y="0" width="500" height="200" fill="#0f3460" rx="8"/>
            <!-- Simplified map -->
            <ellipse cx="250" cy="100" rx="180" ry="70" fill="rgba(233,69,96,0.3)" stroke="#e94560" stroke-width="2"/>
            <circle cx="150" cy="90" r="6" fill="#e94560"/><text x="150" y="115" fill="white" font-size="10" text-anchor="middle">Tunisia</text>
            <circle cx="250" cy="80" r="6" fill="#e94560"/><text x="250" y="105" fill="white" font-size="10" text-anchor="middle">Mesir</text>
            <circle cx="320" cy="75" r="6" fill="#e94560"/><text x="320" y="100" fill="white" font-size="10" text-anchor="middle">Palestina</text>
            <circle cx="380" cy="85" r="6" fill="#e94560"/><text x="380" y="110" fill="white" font-size="10" text-anchor="middle">Suriah</text>
            <circle cx="200" cy="110" r="6" fill="#e94560"/><text x="200" y="135" fill="white" font-size="10" text-anchor="middle">Libya</text>
            <text x="250" y="170" fill="white" font-size="11" text-anchor="middle" font-weight="bold">Wilayah Kekuasaan Dinasti Fatimiyah</text>
          </svg>
        </div>
        <div class="p-3 rounded-lg" style="background:rgba(233,69,96,0.1);border-left:4px solid #e94560;">
          <p class="text-sm">Meliputi: Afrika Utara, Mesir, Palestina, Suriah, Hijaz (Mekah & Madinah), Yaman, dan Sisilia.</p>
        </div>
      `},
      { type: 'content', title: 'Kemunduran & Akhir Dinasti', icon: 'sunset', content: `
        <p class="mb-4">Faktor-faktor kemunduran Dinasti Fatimiyah:</p>
        <div class="space-y-3">
          <div class="flex items-start gap-3 p-3 rounded-lg" style="background:rgba(15,52,96,0.5);">
            <span class="text-xl">1️⃣</span>
            <div><p class="font-semibold">Konflik Internal</p><p class="text-sm opacity-80">Perebutan kekuasaan dan intrik politik di kalangan istana.</p></div>
          </div>
          <div class="flex items-start gap-3 p-3 rounded-lg" style="background:rgba(15,52,96,0.5);">
            <span class="text-xl">2️⃣</span>
            <div><p class="font-semibold">Bencana Alam</p><p class="text-sm opacity-80">Kekeringan dan kelaparan yang melanda Mesir.</p></div>
          </div>
          <div class="flex items-start gap-3 p-3 rounded-lg" style="background:rgba(15,52,96,0.5);">
            <span class="text-xl">3️⃣</span>
            <div><p class="font-semibold">Serangan Perang Salib</p><p class="text-sm opacity-80">Ancaman dari tentara Salib di wilayah Palestina dan Suriah.</p></div>
          </div>
          <div class="flex items-start gap-3 p-3 rounded-lg" style="background:rgba(15,52,96,0.5);">
            <span class="text-xl">4️⃣</span>
            <div><p class="font-semibold">Salahuddin Al-Ayyubi</p><p class="text-sm opacity-80">Pada tahun 1171 M, Salahuddin mengakhiri Dinasti Fatimiyah dan mendirikan Dinasti Ayyubiyah.</p></div>
          </div>
        </div>
      `},
      { type: 'quiz' }
    ];

    // Quiz data
    const quizData = [
      { q: 'Siapa pendiri Dinasti Fatimiyah?', options: ['Salahuddin Al-Ayyubi','Ubaidillah al-Mahdi','Al-Mu\'izz li Dinillah','Harun al-Rasyid'], answer: 1 },
      { q: 'Dari mana nama "Fatimiyah" diambil?', options: ['Kota Fatimah','Fatimah az-Zahra','Suku Fatim','Kitab Fatimah'], answer: 1 },
      { q: 'Universitas Islam tertua yang masih berdiri hingga kini adalah...', options: ['Al-Qarawiyyin','Darul Hikmah','Al-Azhar','Nizamiyah'], answer: 2 },
      { q: 'Kota Kairo didirikan pada tahun...', options: ['909 M','950 M','969 M','1171 M'], answer: 2 },
      { q: 'Siapa yang mengakhiri Dinasti Fatimiyah?', options: ['Hulagu Khan','Salahuddin Al-Ayyubi','Timur Lenk','Al-Ma\'mun'], answer: 1 }
    ];

    let quizState = { current: 0, score: 0, answered: Array(quizData.length).fill(null), finished: false };

    function renderSlide() {
      const slide = slides[currentSlide];
      const content = document.getElementById('content');
      let html = '';

      if (slide.type === 'cover') {
        html = `
          <div class="slide-enter text-center py-12 pattern-bg rounded-2xl p-8" style="background:linear-gradient(135deg, #0f3460, #1a1a2e); border:2px solid #e94560;">
            <div class="w-20 h-20 mx-auto mb-6 rounded-full flex items-center justify-center" style="background:rgba(233,69,96,0.2);border:2px solid #e94560;">
              <i data-lucide="book-open" style="width:36px;height:36px;color:#e94560;"></i>
            </div>
            <h1 class="font-heading font-black text-3xl md:text-5xl text-white mb-3" id="cover-title">${config.main_title}</h1>
            <p class="text-lg opacity-70 text-white mb-6" id="cover-subtitle">${config.subtitle}</p>
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm text-white" style="background:rgba(233,69,96,0.2);">
              <i data-lucide="info" style="width:14px;height:14px;color:#e94560;"></i>
              <span>Klik "Selanjutnya" untuk memulai</span>
            </div>
          </div>`;
      } else if (slide.type === 'content') {
        html = `
          <div class="slide-enter">
            <div class="flex items-center gap-3 mb-5">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:#e94560;">
                <i data-lucide="${slide.icon}" style="width:20px;height:20px;color:#fff;"></i>
              </div>
              <h2 class="font-heading font-bold text-2xl text-white">${slide.title}</h2>
            </div>
            <div class="text-white opacity-90 leading-relaxed">${slide.content}</div>
          </div>`;
      } else if (slide.type === 'quiz') {
        html = renderQuiz();
      }

      content.innerHTML = html;
      document.getElementById('page-info').textContent = `${currentSlide + 1} / ${slides.length}`;
      renderNavDots();
      lucide.createIcons();
    }

    function renderQuiz() {
      if (quizState.finished) {
        return `<div class="slide-enter text-center py-8">
          <div class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center" style="background:rgba(233,69,96,0.2);">
            <i data-lucide="trophy" style="width:32px;height:32px;color:#e94560;"></i>
          </div>
          <h2 class="font-heading font-bold text-2xl text-white mb-2">Hasil Quiz</h2>
          <p class="text-4xl font-bold mb-2" style="color:#e94560;">${quizState.score} / ${quizData.length}</p>
          <p class="text-white opacity-70 mb-6">${quizState.score >= 4 ? 'Luar biasa! 🎉' : quizState.score >= 3 ? 'Bagus! 👍' : 'Tetap semangat belajar! 💪'}</p>
          <button onclick="resetQuiz()" class="px-6 py-2 rounded-lg text-white font-semibold" style="background:#e94560;">Ulangi Quiz</button>
        </div>`;
      }

      const q = quizData[quizState.current];
      const answered = quizState.answered[quizState.current];
      return `<div class="slide-enter">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-heading font-bold text-xl text-white">Quiz</h2>
          <span class="text-sm px-3 py-1 rounded-full text-white" style="background:#0f3460;">Soal ${quizState.current + 1}/${quizData.length}</span>
        </div>
        <p class="text-white text-lg font-semibold mb-5">${q.q}</p>
        <div class="space-y-3">
          ${q.options.map((opt, i) => {
            let cls = 'quiz-option p-4 rounded-lg cursor-pointer border-2 text-white';
            let style = 'background:rgba(15,52,96,0.5);border-color:rgba(255,255,255,0.1);';
            if (answered !== null) {
              if (i === q.answer) style = 'background:rgba(34,197,94,0.2);border-color:#22c55e;';
              else if (i === answered && i !== q.answer) style = 'background:rgba(239,68,68,0.2);border-color:#ef4444;';
            }
            const clickable = answered === null ? `onclick="answerQuiz(${i})"` : '';
            return `<div class="${cls}" style="${style}" ${clickable}><span class="font-semibold mr-2">${'ABCD'[i]}.</span>${opt}</div>`;
          }).join('')}
        </div>
        ${answered !== null ? `<button onclick="nextQuizQuestion()" class="mt-5 px-5 py-2 rounded-lg text-white font-semibold" style="background:#e94560;">${quizState.current < quizData.length - 1 ? 'Soal Berikutnya →' : 'Lihat Hasil'}</button>` : ''}
      </div>`;
    }

    function answerQuiz(i) {
      quizState.answered[quizState.current] = i;
      if (i === quizData[quizState.current].answer) quizState.score++;
      renderSlide();
    }

    function nextQuizQuestion() {
      if (quizState.current < quizData.length - 1) { quizState.current++; }
      else { quizState.finished = true; }
      renderSlide();
    }

    function resetQuiz() {
      quizState = { current: 0, score: 0, answered: Array(quizData.length).fill(null), finished: false };
      renderSlide();
    }

    function renderNavDots() {
      const dots = document.getElementById('nav-dots');
      dots.innerHTML = slides.map((_, i) =>
        `<div class="w-2 h-2 rounded-full cursor-pointer" style="background:${i === currentSlide ? '#e94560' : 'rgba(255,255,255,0.3)'}" onclick="goToSlide(${i})"></div>`
      ).join('');
    }

    function nextSlide() { if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(); } }
    function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }
    function goToSlide(i) { currentSlide = i; renderSlide(); }

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (cfg) => {
        config = { ...defaultConfig, ...cfg };
        document.getElementById('nav-title').textContent = config.main_title;
        document.getElementById('app').style.background = config.background_color;
        renderSlide();
      },
      mapToCapabilities: (cfg) => ({
        recolorables: [
          { get: () => cfg.background_color || defaultConfig.background_color, set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => cfg.surface_color || defaultConfig.surface_color, set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => cfg.text_color || defaultConfig.text_color, set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => cfg.primary_action || defaultConfig.primary_action, set: (v) => { cfg.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => cfg.secondary_action || defaultConfig.secondary_action, set: (v) => { cfg.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => cfg.font_family || defaultConfig.font_family, set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => cfg.font_size || defaultConfig.font_size, set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (cfg) => new Map([
        ['main_title', cfg.main_title || defaultConfig.main_title],
        ['subtitle', cfg.subtitle || defaultConfig.subtitle]
      ])
    });

    renderSlide();
    lucide.createIcons();
  </script>
